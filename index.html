chapter1: {
text: `CHAPTER ONE – THE SYKE HOUSE

On the outskirts of a city, there’s a quiet neighborhood, and in this neighborhood, there’s a cozy brick house with a forest behind it and other houses nearby. Out of all these houses, the brick house is the most important, because it is the home of Mr. and Mrs. Syke. Mr. and Mrs. Syke are psychologists studying the human mind, and they love to work together and share the knowledge they’ve gained with one another. They read books about psychology, they watch shows about psychology, and they talk to all kinds of people who know about psychology. Their whole home is filled with psychology, and sometimes, it feels like it’s all they eat and breathe. Mr. and Mrs. Syke are very important because of their interest in psychology. However, they are not the focus of this story. The real subject of interest is their cat, Alice.

 Alice is a house cat who has an almost scientist-like curiosity. She loves learning about how minds work because of how much she has learned from her humans, and she would love to meet other animals to see what they’re like.

	Alice has heard about human minds all her life, but she wants to know how animals’ minds work, since she’s a very curious cat. The only problem is that she has no other animals to talk to, because she lives with only her two humans.
Recently, Alice has started watching the forest in her backyard, trying to see the animals there and how they act. She’s been able to observe squirrels, birds, bunnies, and dogs in her yard for years now, but she’s never been in the forest. She thinks there must be fascinating animals there.
	Speaking of fascinating animals…what’s happening with that bunny currently outside Alice’s window?

	Alice hops up onto the windowsill so she can see him better. There’s a dog, escaped from his human, that’s chasing a bunny across her front yard. Normally bunnies run and hide as quickly as they can, but not this one. This bunny starts yelling at the top of his lungs, and as Alice is watching, he actually kicks the dog across the nose.
	“DON’T CHASE ME, YOU BIRD-BRAINED CANINE!” the bunny yells, and real smoke pours out of his ears. Alice has to cover her mouth with a paw so the two animals can’t hear her laughing as the bunny shouts, “GET OUT OF MY YARD.”
	The dog turns and runs back to his human before the bunny can do anything else. “I was just trying to have a little fun!” he wails.
	Alice leans toward the window so she can see the dog and bunny better, and as her head bumps the window, it slides open by a few inches.
	Is the window…unlocked?
	Alice shoves it with her paw, and the whole window opens, letting the smells and sounds of outside blow in. The front yard is right there, just a small jump down into the grass that she’s never even touched before.
	This is it! This is her chance!
	Alice leaps gracefully from the window, and her paws land in the soft dirt. Grass tickles her legs, and she grins and bounds across her yard, faster than any butterfly or squirrel or robin can chase her. This is amazing! This is freedom!

	“What are you so excited about, house cat?” grumbles a voice from behind her. Alice turns to see the bunny. He has an angry scowl drawn across his face, and his ears are still smoking a little.
	“I’ve never been outside before,” she replies, beaming. The bunny’s scowl fades when he sees how happy she is. “My name is Alice, what’s yours? I’ve never actually met a bunny.”
	“Rabbit,” he corrects. “Not bunny.”
	“Oh, your name is Rabbit?”
	“No!” he splutters. “My name is Maurice.”

Maurice is a rabbit who won’t let others control him. His anger can sometimes get the best of him, but deep down he actually cares a lot about others—even if he doesn’t know it yet.

	Alice smiles at him and reaches out to shake his paw like she’s seen her humans do. “Nice to meet you, Maurice.”
	When all he does is stare at her paw, she quickly pulls it back.
“Anyway,” she says, “I saw you out the window. And I just thought you were very interesting—you’re not like any other bunny I’ve seen before.”
“Rabbit,” says Maurice.
“Like any rabbit I’ve seen before?” Alice’s tail twitches in irritation. “But now I want to go into the forest. Because if you’re special like that, I can’t even imagine what must be in the forest.”
Maurice backs away a few steps. “I don’t like the forest. You shouldn’t go in there.”
	“Why not?” Alice tilts her head curiously. “Are you scared?”
“I—I—of course I’m not scared!” Maurice exclaims. A little more smoke puffs out of his ears. “Fine, I’ll come with you. Maybe I can get some good food while we’re there. And since I’ll be with you, don’t worry, nothing will hurt us.”
“It’s a deal,” Alice says, smiling down at the fierce rabbit next to her. “Let’s go!”

And together the cat and the rabbit enter the forest without looking back.`,

chapter2: {
text: `CHAPTER TWO – THE BEEHIVE

The forest is so bright and colorful that it almost hurts Alice’s eyes. Maurice bounds along beside her, and she realizes with excitement that she’s made her first real friend in the outside world.

	They walk by some robins and a few butterflies. When the robins watch them pass by, Maurice shouts, “Hey! Stop looking at us!” and they turn away, laughing. Alice sees squirrels chasing one another and a hawk taking flight from one of the tallest trees. This is the most amazing place she’s ever been.

	Her eyes land on two creatures in the distance, and she gasps. “Are those deer?”
Maurice looks too. “Yeah. They’re nothing scary.”
“I didn’t think they would be—oh, can we go meet them? Please?”
“If you can catch them,” Maurice says.

	Alice darts toward the deer to say hello, but before she can reach them, they see her, flick up their white tails, and go leaping off into the trees. She sighs and slows to a stop.
When Maurice catches up to her, he says, “Don’t worry about it. They run from anyone or anything that’s weird. And you’re pretty weird.”
Alice doesn’t hear the last words, because she’s noticed something else in the distance—something even more unusual. There’s a yellow structure hanging from a tree branch a little ways away, and she’s never seen anything like it before.
“What’s that?” she asks the rabbit, pointing with her paw at the yellow thing.
He shakes his head and backs up. “That’s a beehive. That’s where bees make their honey. You don’t want to go over there—they’ll get mad and sting you.”
“Honey?” Alice echoes, her eyes lighting up. “I’ve only tried honey once before. It would be fun to try it again.”
“That is a terrible idea.”

	But Alice has come here to learn, not to avoid other animals based on a rabbit’s advice. “They won’t mind if I ask nicely,” she says, looking back at Maurice. “I’m going to try.”
“This is a terrible idea,” the rabbit repeats, skirting past the beehive while staying far away from it. He ducks behind a tree beyond the hive and calls, “I’m not helping you out if it goes badly.”
Alice walks over to the tree and looks up at the bees. “Would you be okay with it if I tried a little of your honey?” she asks politely.
The bees buzz once, loudly.

	“I think that’s a yes!” Alice exclaims to Maurice. She latches onto the tree trunk and climbs up the tree to the low branch where the beehive is. The bees buzz again as she gets closer, and then she reaches out to the hive to take some honey.
As one, all the bees swarm into the air and hover above their beehive. They’re now buzzing so angrily it’s like they’re shouting at her. Alice watches them in alarm, then looks to Maurice.
“What are they doing?” she calls.
“They’re really, really mad!” he yells. “Run!”

	Alice leaps to the ground as Maurice bounds out from behind his tree. The two of them dart forward and sprint deeper into the forest with the bees directly behind them.
“What do we do?” Alice cries, jumping gracefully over a fallen branch.
“Not try to take their honey is what we do!” Maurice says back.
Alice swerves around a tree and almost slams into him. “I didn’t think this would happen! They seemed nice!”
“Bees are not nice!” Maurice shouts, and a few puffs of smoke come out of his ears. “Just—just don’t get stung, okay? If one of them catches you, the rest will, too.”
“And what if that happens?”
“Well, don’t find out,” he says.

	Alice can’t think of anything else to say, so she keeps running in silence. She and Maurice scurry through tall grass, dodge around trees and fallen branches, and leap over uneven patches in the ground. Her heart is racing like it never has before, from the strain of so much running, from fear, and from…excitement? Is this exciting?
Oh, Maurice would kill her if he had any idea she’s enjoying this.
“Are they ever going to give up?” she asks as the bees’ buzzing swells louder.
“It sure doesn’t seem like it,” he yells.
She turns to see how close they are, and it makes her gasp. They’re terrifyingly close—if she trips or stumbles, the bees will catch her.
Alice faces forward again, and when she does, she notices something in the distance. There’s a new animal standing there watching them, and she and Maurice are getting closer to her every second. Maurice must notice her too, because he exclaims, “It’s a fox!”

	Bees chasing them and a fox in front of them? Where can they even go?
“Follow me,” the fox calls from up ahead as Alice and Maurice draw nearer. “I can help you!”
“Never trust a fox,” Maurice pants.
Alice looks at the fox and considers the bees behind her. What should she do? In an instant, she’s made up her mind.
She chooses to…
 

What will you do…`,

TRUST THE FOX

	“Go with her!” Alice says.
“What? Are you crazy?” Maurice demands.
Alice heads toward the fox. “She can’t be worse than the bees—just go!”

Maurice starts to look interested, but he quickly covers it up with a glare instead.

	Maurice hunches over. “We’re still lost. And you would’ve ended up here anyway.”

	“So, anyway,” Bluebell says, turning toward Alice, “what are you doing in the forest? I know he came for food.”

text: `CHAPTER THREE – THE GARDEN
RUN PAST THE FOX

	“Keep running!” Alice says. She and Maurice dart past the fox, who leaps into her den just before the swarm of bees flies past. “Is there anywhere we can go? Do you have any ideas at all?”
“Well, I—no, I can’t think of anything,” he answers in frustration. “You know, you really should have just listened to me in the first place!”
She looks to him so she can apologize, but at that moment, Maurice trips on a tree root, and with a horrified expression, he’s flung to the ground.
“Maurice!” she cries, stopping in her tracks to run back to him. But before she can start toward him, another voice shouts from a short distance away.
“LEAVE THEM BEE!”
Alice whips her head around to see the same fox from before.

	“Sorry, I couldn’t help myself,” the fox says with a bashful grin toward Alice. Then she faces the bees and continues, “If you leave these two alone, I promise, I’ll help you protect your hive from now on. I don’t think they know how rude it is to try to take your honey like that, but I’ll make sure they understand.”
“I know it’s rude,” says Maurice, his voice muffled because he’s laying with his face in the dirt.
Alice and the fox watch the bees as they lift up and soar off through the trees, apparently agreeing with the fox’s suggestion. Then the two of them look at each other, and Alice grins.
“Thank you for getting us out of that,” she says. “How did you get them to go away so fast?”
The fox smiles back a little more shyly. “It wasn’t hard. I just know what to say sometimes, especially if I understand someone.”
“Oh, would you say you understand the forest animals?” Alice asks. If the fox knows other animals well, that could help her so much!
Right as the fox opens her mouth to respond, Maurice calls from the ground, “Yeah, don’t mind me—I just got a bee sting over here, but that’s okay! You keep on talking!”
“Oh no, you did?” Alice exclaims.
The fox bounds over to him, her tail swishing gracefully behind her. “I’m so sorry, I didn’t know! Where is it?”
“My leg,” Maurice says.
“I know exactly the place to fix that,” the fox tells him. “It’s a little garden where some squirrels and deer grow plants, and I bet there’s something there that can help you. If you can get on my back, I’ll carry you there and let your friend here follow us.”

	“Get on your back?” Maurice repeats. “I can walk myself, thank you!”
He stands up carefully, but the moment he puts weight on his stung leg, he falls back to the ground. He lays there, glaring around him, but doesn’t try to get back up.
The fox lays down too, so she’s at eye level with Maurice. “I bet that hurts,” she says sadly. “Are you sure I can’t help you?”
“Yes, I’m sure!”
“Alright, then.” The fox looks to Alice. “Well, while he lets that pain fade a little, how did you both end up being chased by bees anyway?”
“I wanted to try their honey,” Alice explains, but her reasons seem so foolish now, especially since Maurice was stung because of her. “And I asked them for permission, and I thought they said yes, so I went up to their hive to take a little.”
The fox tilts her head in interest. “You asked them for permission?”
“Yes, it would’ve been rude otherwise, wouldn’t it?” Alice says. “And once I tried to take the honey, they chased me, and then Maurice joined me and we both ran away.”
“I told her not to take it,” Maurice chimes in from the ground.
“Hmm,” the fox says. “You must have been pretty brave to run with her even though the bees weren’t going after you.”
Maurice looks impressed by this. “Yeah, I guess so.”

	“I think the squirrels and deer who take care of the garden would like to hear about this. We don’t have visitors from outside the forest very often, and usually not interesting ones like you,” adds the fox.
“We should go to the garden,” Maurice says.
Wait—did the fox just get on Maurice’s good side that easily?
“What do you think about letting me carry you? It would be faster, and I’m sure your leg is really bothering you,” the fox says. “The sooner we get to the forest, the sooner we can cure that sting.”
“I suppose,” Maurice sighs. “Just remember, this isn’t because I need to be carried. It’s because I’m choosing it.”
“Of course.” The fox moves in front of Maurice and lowers to the ground again. He gets up slowly and climbs onto her back, and then she stands up, careful to make sure he doesn’t fall. “Okay, great! And you—” she looks at Alice— “wait, what’s your name?”

	“I’m Alice,” says the cat. She doesn’t try to shake paws this time.
“And I’m Maurice,” says the rabbit.
The fox beams at them. “Nice to meet you both! I’m Bluebell.”

Bluebell is a fox, but unlike most foxes, she uses her cleverness to help others. She can be shy at times and doesn’t like to intrude, but she loves doing what she can to help everyone around her.

	“Anyway, Alice, will you be okay to follow me to the garden?” Bluebell asks.
Alice nods. “Yeah. And then I can explore more on the way!”
“Yes! What is it you’re here to explore? How did a cat and a rabbit end up in the forest?” Bluebell asks as they begin to walk.
Alice catches a small smile from Maurice when Bluebell says rabbit instead of bunny. When he notices Alice watching, he scowls and looks away, and Alice has to try not to giggle.
“Alice decided she needed to come meet the animals here,” Maurice explains, his voice a little annoyed, “and I said I would come with her to help keep her safe.”
Alice watches a pair of cardinals fly around a tree and then take off into the sky. “Yes…pretty much. I want to learn more about the animals here because my humans are psychologists, and I’ve learned a lot from them about humans but nothing about animals.”
“Sorry, your humans are what, exactly?” Bluebell asks.
“Psychologists. They’re scientists who study other people’s minds and behavior. It’s really fascinating, actually,” says Alice. “So I was hoping I could see what the psychology of forest animals is like, and Maurice seemed like a very interesting example.”

	“Did he?” Bluebell says.
“Yeah! Did you know he can make sparks and smoke come out of his ears? Isn’t that fascinating?”
“I’m RIGHT HERE,” Maurice interrupts, and his ears have started smoking a little. “You don’t need to talk about me like that. I can speak for myself, thank you very much.”
“Oh—sorry. I just thought it was interesting, that’s all,” Alice says, and she has to look away. She’s never had friends before, and it’s definitely a bad sign that Maurice was shouting at her.
But it was a bad idea to talk about him right in front of him like that, wasn’t it?
“That is interesting!” Bluebell says. “Maurice, I’ve never met anyone like that before. That’s really cool.”
“No, it’s not.”
“It is—” she says.

	Maurice shakes his head violently. “It. Is. Not.”
“—because for one thing, smoke will put bees to sleep. Did you know that? Maybe you could have protected yourself and Alice just like that.”
“Really?” Maurice asks, and he seems interested now.
Bluebell nods. “Yep!”
“Well, I still think it’s stupid. But it’s too bad I didn’t know that before,” he says.
“I wish you were here with us before, Bluebell.” Alice scurries forward so she’s directly beside the fox and can look at her while they walk. “You could have helped us a lot with everything you know. How do you know so much about the forest animals, anyway?”
“I’ve lived here my whole life. There’s a lot you can learn just from watching,” Bluebell replies. “Not everyone wants to talk to me, though. Most of the animals here don’t trust me because I’m a fox.”
“We didn’t either,” says Maurice.
Alice tilts her head. “Are you unusual for a fox, or is everyone just wrong about foxes?”
“I think I’m unusual, or at least, my family is—they’re the ones who taught me to help other animals instead of tricking them.”
“Or you could have inherited that from them genetically,” Alice says. “Like with gene and environment interactions, or nature versus nurture.”
“What kind of nonsense is that?” Maurice asks.

	“They’re psychology things. It means that the way you were raised and how your family acted could have affected how you act now, but also that the way you act might have been inherited from your family. It’s hard to know for sure. And you can change your family and they can change you, so really, it goes both ways.”
“My family sure didn’t learn anything from me,” Maurice grumbles.
“I’m not sure if they taught it to me or if I inherited it,” Bluebell says.
“You wouldn’t really be able to tell. It might be some of both.” Alice pauses to sniff a pretty pink flower, which smells way better than any candle her humans ever used, and it takes a moment for her to catch back up to Bluebell and Maurice.
“I wonder why everyone thinks foxes are mean, though,” Bluebell is saying. “Even though I live here and they should know that I’m not.”
“You make prototypes of things without realizing or planning it,” Alice says. “You pretty much take the knowledge you have of something and make one representation of it for your brain, and that’s what you think of when you think of that thing. So if I imagined foxes before now, I probably would have pictured someone clever and tricky. But now I can accommodate that prototype and update it to match the things I’ve learned now.”
“And what do you imagine now?” Bluebell asks.
“I don’t know,” Alice answers. “Someone more like you, I think.”
“I imagine this pain in my leg that’s getting worse and worse every minute,” says Maurice. He’s slumped over Bluebell’s back, and Alice thinks that he really does look like he’s badly in pain. “How close are we?”
Bluebell looks around as she walks, seeming to notice every tree, every flower, and every blade of grass near them. “Actually…we’re here.”
“Here? I don’t see anything,” Maurice groans.
“That’s because you’re not looking hard enough.” Bluebell ducks under some low branches, but she’s careful enough that Maurice doesn’t fall, and then she vanishes to the other side of them.
“Oh. I see,” says the rabbit.

	Alice follows them under the branches, and when she emerges, there’s a garden on the other side. There are patches of dirt with all kinds of plants growing out of them and paths running between the plants so no one steps on them. There’s even an old, falling-down fence surrounding the whole area, and Alice breathes in all the new scents and looks at the whole scene with a grin growing on her face. It’s just so beautiful here.
There are squirrels moving among the plants and deer talking to one another just outside the fence, but as soon as they see Alice, Maurice, and Bluebell, all of them freeze.
“There’s a fox!” one cries out.
“And a cat!” says another.
“What, don’t they know you?” Maurice asks, looking down at Bluebell.
“Not really,” she says, and then she looks at the squirrels and deer. “We’re just here to try to help. This rabbit has a bee sting, and I don’t have any way to fix it on my own. Do you have any plants that will make it less painful for him?”
Two of the squirrels exchange a look, and then one bounces forward. “We can help you if you promise not to take anything else from us. We work hard to maintain this garden, and we can’t afford to have anyone steal from it.”
“We won’t steal, I swear it,” Bluebell answers solemnly.
“We just came here to help Maurice,” Alice chimes in. “If not for Bluebell, he and I would be in big trouble right now. She’s helped us a lot, and we only just met her.”
All the squirrels seem surprised by this, but the one that spoke waves Bluebell forward. “The plant you need is over here. It’s called aloe vera. We can put it on the bunny’s leg if you bring him over.”
“I’m a rabbit, thank you,” Maurice says, but his voice is quiet.
A few of the squirrels lead Bluebell over to the aloe vera, and she lowers Maurice carefully to the ground. Alice follows so she can watch as the squirrels pull a leaf from the plant, squeeze it, and then spread the paste from it onto Maurice’s sting.

	“Did that help?” one of the squirrels asks.
Maurice tests out his leg, and this time, it holds steady when he stands on it. Something almost like a smile crosses his face. “It did. It doesn’t hurt at all anymore.” 
“Thank you,” says Bluebell.
“Oh—yes. Thank you,” Maurice echoes. He leaps into the air twice like he’s testing to make sure the plant really worked, and it seems like it did, because his smile gets a little bigger. Alice can’t help smiling herself.
Most of the squirrels and deer wander into the forest after that, but a few scatter around the rest of the garden to water and prune plants and to watch carefully from a distance.
Two squirrels stay to keep talking, though, and a deer even comes into the garden to join them.
“How did you end up with a bee sting?” asks the squirrel who spoke to them the most earlier. She’s been holding the aloe vera leaf, but now she sets it down to focus more on the conversation.
“I was trying to take some honey from the bees near the edge of the forest, and they chased Maurice and me until he got stung,” Alice says. “But Bluebell came at that point and asked the bees to leave us alone.”
“You tried to take their honey?” The three animals frown at her, and suddenly the few animals still around the garden seem to be watching much more closely.
“She asked them first,” Bluebell explains quickly. “And since she’s never been in the forest before, she didn’t understand that they weren’t okay with it, and she thought they said yes.”
One of the squirrels peers at Alice curiously. He looks like he’s the oldest of all of them, and he also seems the most interested in hearing what the cat, rabbit, and fox have to say. “Where are you from, then?”
“I live in a house right outside the forest,” she says. “But my humans have never let me leave before. I ran off today while they were at work.”
“At work. Hmmm.” The old squirrel studies Alice, Maurice, and Bluebell. “What are all of your names? Where did the rest of you come from? Tell me.”
“You can go if you have places you need to be,” says the deer.

	Alice shakes her head. “My humans won’t be back until later, so I have plenty of time. And it’s beautiful here—I don’t want to leave so soon.”
“Well, if you’re staying, then I’m going to see if there’s food around here,” Maurice declares. He bounds off deeper into the garden, and Alice and Bluebell and the squirrels watch him go.
Should he be left to wander alone? Alice feels bad not going with him—he is the one who brought her into the forest to begin with, after all.
“This is Alice, I’m Bluebell, and that’s Maurice,” Bluebell says. “Alice is trying to learn more about forest animals, since she’s never been in the forest before. Alice, why don’t you talk to these animals about their garden?”
Alice is still watching Maurice hop away. She doesn’t want to leave him alone, but she also wants to speak more with the garden animals.

What will you do…`,

text: `CHAPTER FOUR – FOLLOW MAURICE

	“I’m sorry, but I’d like to follow Maurice,” Alice says. “You should stay and talk with them, though!”
“Oh, okay,” Bluebell responds, looking slightly confused. She gives the fox equivalent of a shrug and turns back to the squirrels and deer as Alice heads into the garden in pursuit of Maurice.
She finds him chewing on some leaves toward the middle of the garden. A few animals are watching from outside the fence, but none have actually come up to him, and he looks quite content.

Alice stares.

“What’s wrong with the deepest part of the woods?” Alice asks curiously.

	“Oh. Let’s not go there, then,” Alice agrees.
A squirrel pops out of some leaves in front of them and shakes his head. “There’s no dangerous part of this forest. The only dangerous thing is the city.”
“Oh. Hi.” Alice waves uncertainly at him. “Who are you?”
“My name’s Braxton,” the squirrel responds proudly. “I don’t run this garden—that’s Colin, Gina, and Asher—but I help out here.”
“And what would you know about the forest?” Maurice grumbles.
“He lives here,” Alice reminds him.
“Well, when I was here before, there were scary animals in the middle of the forest,” Maurice says.
“There never have been,” Braxton responds blankly. “There’s only foxes, snakes, and hawks that are dangerous here.”
“Hmph,” Maurice says. Alice sees one puff of smoke come out from his ears.
“Let’s keep going,” she tells him quickly, nudging him forward. “Thanks for—uh—your help,” she adds to Braxton.
“Anytime,” he replies, diving back into the pile of plants he had been in before.
“So…what did you come here for in the past?” Alice asks Maurice, pausing to sniff some herb they walk past.

	“Right.” Alice watches him reach for some vegetable that’s buried in the dirt, lift it to his mouth, and take a bite. He smiles and stuffs the rest of it into his mouth. This is one of the first times she’s seen him really smile, isn’t it?
“You know, my humans really only let me eat cat food before,” she tells him. “Maybe I should try something here too. Those mushrooms Bluebell gave me earlier were really good.”
“They were. You know, I do really like it here. It’s so much better than running around the city yelling at dogs.”
Alice feels the curiosity burn inside her, but she doesn’t want to be rude and ask too many questions. So she decides to ask just one. “Why don’t you live here, then?”
He huffs. “Certain…other animals. They like to antagonize me when they see me.”
“Oh.”
“So I avoid the whole forest. They’re the animals in the deepest part of the forest. I’m sorry. I just—don’t want to go there because of them, not because there’s dangerous animals there.”
“No, that makes sense,” Alice tells him. “You could have just said as much, you know.”
He shakes his head. “No. Nobody likes sharing personal things about themselves.”
“I’ve never had a chance to share something personal before,” Alice says, “but actually, I don’t think I mind. Here goes—I talk to myself a lot because I don’t have anyone else to talk to. Also, one time I fell off the top of the fridge because I got too curious about the dust bunnies up there and started chasing them. Curiosity kills the cat, you know.”
He studies her. “Are those the worst things you can share about yourself?”
“Oh, I don’t know…probably.”
He scoffs.

	“I’ve lived a boring life as a house cat! There’s not much for me to do!” Alice tells him. “Listen—I like taking risks and learning things. If I could have done more, I would have. Like coming here today.”
“I guess so,” he mumbles.
“So…what about this plant?” Alice asks, pointing to a small bundle of leaves poking up out of the dirt. Maurice leans down and yanks it up by the stem using his teeth, and Alice gasps in surprise when she sees what it is.
“It’s a carrot!” she exclaims.
“I’ve never tried one of those before,” Maurice says, studying it.
“Rabbits really love those,” she tells him.
“Okay. I’ll try it, then.” He chomps a large bite out of the carrot, chews, and then spits it onto the ground.
He immediately spits it out. “What is this—disgusting―blecchh! Whoever told you that rabbits like carrots was the worst liar I ever heard of!”
Alice has to turn away so he can’t see her laughing.
“Come on. We’re going back to one of the plants I liked, and I’m going to eat that to get this taste out of my mouth,” he says with a scowl.
She follows him back to the first plant she found him eating, and he takes another huge mouthful of it. As he’s chewing, Bluebell comes up to them with the squirrels and deer.
“So that’s where you are!” she says. “We were wondering where you got to.”
Maurice finishes his bite and slumps to the ground. “You know what…I think I might be going into a food coma.”
“Alice, would you like to talk to them some?” Bluebell asks, nodding toward the garden animals she’s with. “I think you’d be interested in what they have to say.”
“These are Colin, Gina, and Asher that I told you about earlier,” Braxton announces, his head popping out of some vegetables a few feet away.
“What―” one of the squirrels says. “I mean, thank you, Braxton.”
“You’re welcome,” he replies, ducking back down again.
“What a character,” the deer whispers.

	Maurice groans, still laying on the ground. “I need a more comfortable place to lay down. I want to take a nap.”
Bluebell smiles apologetically at the garden animals. “I think we should probably go. I have a great idea of somewhere he can rest.”
They all nod to her.
“It was nice to…kind of meet you,” Alice tells them. “Maybe we can come back later. I’d like to actually talk to you.”
One of the squirrels nods. “Yes. I’d be interested to meet a house cat, too.”
“I know just the place for Maurice to take a nap,” Bluebell says. “Alice, there’s some geese there that you could meet if you’d like.”
“That would be nice!” Alice agrees.
Maurice nods slowly. “Yes. That would be.”
“Okay,” Bluebell says, nudging him with her paw. “Then you’re going to have to get up. We’re going to the lake.”
Maurice stands up, shaking his head like a dog would. He twitches his ears and then turns to Alice and Bluebell.
“I’m ready,” he says.
“Yay! Lake, here we come,” Alice cheers.
The squirrels and deer wave as the three of them leave the garden, waving back—well, Maurice doesn’t wave, but Alice and Bluebell do. They march into the trees and the heavier shadows beneath them, and the cat and rabbit follow the fox to the lake.`,

ADE_forest: {
text: ` WHAT'S IT LIKE TO LIVE IN THE FOREST?

	Alice looks at Gina, Colin, and Asher. “What’s it like to live in the forest?”
“Well, you know…like living in a forest,” answers Gina.
“You can do better than that,” Asher says. “It’s peaceful here. The birds say that the city is loud and busy and has too many humans. But here, you get to know all the other animals, and you can live pretty much wherever you want and be friends with all kinds of animals.”
“And you like that?” Alice asks.

	“The forest is our home,” says Gina. “It’s animals with animals, and we all take care of ourselves and each other. We won’t be going anywhere anytime soon.”
“When you live in the forest, you wake up with the sun on your face every day. You can wander through the trees if you want, or go rest in a patch of flowers, or spend all day burying acorns. It doesn’t matter. We all live and thrive here, and the forest will support us with whatever we want to do,” Colin answers.
"Cheesy old man,” Asher laughs, shaking his head.
“Don’t you ‘cheesy old man’ me!” Colin retorts, his tail standing on end. “Or I’ll have to make you taste-test the onions again.”
“Not the onions.” Asher shakes his head even harder. “Don’t make me eat the onions.”
“So you all get along here? Do you work together or fend for yourselves?” Alice feels like she’s interviewing them like a human on television would do. This is fun.
“All of us who run this garden get along well. We provide food for the other animals who need it, too,” says Colin. “I’m not as sure about the other animals. But here at least, we support each other and all live in peace.”
“I used to live in the rest of the forest before my friends introduced me to the squirrels who ran this garden,” Asher adds. “It was quieter outside of the garden because there’s more of a community here, but I could wander as much of the forest as I wanted back then. That was before I got busy caring for our plants here. And as long as I avoided the more dangerous animals, I would be fine. My friends and I would travel most of the forest every day, just because we could.”

	“It’s beautiful out there,” Bluebell agrees with a smile. “It feels like it’s the whole world even though the city is right outside.”
Gina frowns thoughtfully. “Why haven’t I seen you before? Do you live in this forest?”
“Yeah,” Bluebell answers, ducking her head. “I just…don’t stay around animals a lot.”
“Why not?” Asher asks.
“Well, you know, they tend to ask me to go away if I come near them. No one trusts me much even if I don’t do anything wrong.”
“That’s representative bias,” Alice blurts out.
All four other animals turn to stare at her.
“Um. It’s something I learned from my humans. It pretty much means that you judge every fox based on what you already think of them, not on what they’re actually like. You use the mental representation you already have of foxes and then see every fox like that.”

	“Interesting human knowledge,” Colin decides.
“I’ve never thought of it that way,” Gina says, studying Bluebell. “I’m sorry if I did that to you.”
“Yeah, you seem nice—a lot less of a trickster than I thought a fox would be,” Asher adds. “I’ll think about that next time.”
“Oh…thanks.” Bluebell seems like she might be smiling. “I’m at least glad you were all willing to let me in now.”
Colin opens his mouth to respond, but at that moment, a voice bursts out from some plants a few feet away.
“What is this—disgusting―blecchh!”
Maurice leaps out of the plants, spitting something out of his mouth and then glaring at it. Alice doesn’t think it should be funny, but she has to fight to not start laughing.
“Did you eat a carrot?” Asher asks, peering at the patch of plants Maurice came from.
“Is that what that was? Absolutely disgusting,” Maurice huffs.
“Wait,” Alice says, and now she can’t help but laugh a little, “aren’t rabbits supposed to love carrots?”
“Alice, that sounds like your prototype of rabbits is wrong,” Bluebell tells her, smiling.
Maurice gives one last glare at the carrot he spit out and then comes to stand near everyone else. “Oh, don’t I make every part of your prototype wrong? Whatever. I’m never eating carrots again.”

	“Did you find anything you did like?” Gina asks.
“Yeah, there were a few things,” Maurice answers. “I might have to go eat one of those again to get this taste out of my mouth.”
He hops away again, and as soon as he’s out of earshot, Colin says, “That is quite some rabbit.”
“He’s not what I was expecting,” Alice agrees, “but he’s been helpful. And friendly, in a way?”
Gina gives a shrug, or the squirrel equivalent of one. “Sure…if you say so.”
Bluebell frowns a little at this, but she doesn’t respond to it. Instead, she says, “Hey, Alice, I know you wanted to learn the forest animals’ psychology—”

chapter5: {
text: `CHAPTER FIVE – THE LAKE

	Alice is grinning as they get to the lake. Everyone is happy, they’re exploring the forest, and she feels so…alive.
And the forest seems almost familiar somehow. Like it’s a home that she’s never known, but now that she’s here, she really belongs.
The three of them emerge from the trees to find a wide, shining lake. Alice has to squint because the sun’s reflection on it is so bright. There are geese resting along the shore, and fish leap out of the water every so often. She’s never seen anything like it before.
“Wow,” she whispers.

	Bluebell grins at her expression, then turns to Maurice. “See that tree over there, Maurice? If you lay in the shade under it, that would be a good place for a nap.”
Maurice nods and then heads to the tree. As he goes, Bluebell wanders toward the lake for a drink, and Alice walks toward the geese, her tail in the air from excitement. The geese watch sleepily as she approaches, only a few actually lifting their heads to see her, the rest observing with their heads tucked into their feathers.
“Hello,” Alice says. “My name is Alice. I’m a cat from the city, and I’d love to talk to you about what it’s like to live in the forest, if that’s okay. I’m trying to learn about the psychology of animals here, and—”
“We’re trying to sleep, can’t you see that?” interrupts one of the geese.
“Oh, shut up, Ronald,” says another goose. “Go back to sleep if you care so much.” She stands up, stretching out her wings, and then comes to stand in front of Alice.
“Hello,” Alice repeats uncertainly.
The goose stares down her beak at Alice. “Hello. You were saying?”
“Oh. I’m a cat from the city, and I want to meet the animals here so I can learn more about their psychology—the way their minds work—so I was wondering if you’d be willing to talk with me for a while?”
“Sure.” The goose sits and fluffs her feathers, rearranging them with her beak without watching Alice. When Alice doesn’t say anything, she lifts her head up to look at the cat. “Is there something you were going to ask me?”
“Sorry, I didn’t want to interrupt you,” Alice stammers. “Anyway, um…what’s  your name?”
“I’m Beatrice,” the goose answers.

	“It’s nice to meet you, Beatrice. I just wanted to ask…what’s it like to live here in the forest?”
“It’s nice. Kind of boring, but nice. We only live here for part of the year, though, because otherwise we migrate south,” Beatrice says.
“That’s an instinct,” Alice interrupts. “A behavior you all do and share without having to learn it—sorry. Carry on.”
“We spend a lot of time laying around or swimming in the lake,” Beatrice continues like nothing happened. “We travel as a group, so I can’t do much outside of what the group decides to do—which, again, is mostly laying around and swimming.”
“That’s interesting,” Alice replies. “Do you ever wish you weren’t stuck with everyone else?”
Beatrice turns back to fluffing her feathers. “Not really. It’s better that way.” She pauses to straighten a couple of feathers, then adds, “There’s less responsibility if everyone has to do some of the work.”
Alice nods. “That makes sense.”
“You know, I’m kind of tired,” Beatrice says. “I might—”
Before Beatrice can finish speaking, a cat comes barreling out of the forest, leaping toward Alice and all the geese. At the sound of the cat’s hurried footsteps, all the geese sit up in alarm and dash into the water with a flurrying of wings, leaving the entire shoreline bare. Beatrice, too, scrambles into the water, glaring at the cat as she goes.
“Hey, what was that for?” Bluebell calls from where she’s been drinking from the lake.
“Sorry,” the cat says quickly, turning and dashing back into the trees.

	Alice frowns. The geese all swim farther away, and Beatrice isn’t even looking at her anymore, so she goes back to Bluebell.
“That was rude of that cat,” Bluebell says.
“Yeah. I’m not sure what that was all about.”
“Sometimes animals like to chase the geese into the water for fun,” Bluebell explains. “That must be what just happened—only it was at a very bad time.”
Alice turns to where Maurice is lying under the tree. “Well, at least he didn’t wake up from it all.”
“He must’ve eaten a lot,” Bluebell laughs. “You know, I’m feeling kind of tired myself. I might lay under the tree too if you wouldn’t mind that.”
Maurice seems so comfortable, and there’s a very warm, very cozy looking ray of sunlight on the tree branches above him. Alice realizes suddenly that she could use a nap, too.
“Yes, that’s fine,” she says. “I’ll join you, actually.”
They walk over to the tree quietly so they don’t disturb the rabbit sleeping beneath it, and Bluebell lays in the shade beside him while Alice clambers up into the tree branches above them. She curls up in a spot where two branches meet, and then she sets her head on her paws and closes her eyes.
The sound of the lake water is so comforting, and the sun is so warm on her fur, that she drifts off into sleep almost immediately.

	Then she begins to dream.
First, she’s at her house watching television with her humans. They’re playing a comedy show and laughing at it, and suddenly a rabbit appears on the television, flames emitting from his ears. He reaches through the screen and pulls Alice into the forest.
“You need to help me,” Alice says, realizing that she has a problem even though she hadn’t known it before. “There’s someone in this forest I’m looking for—someone I’m missing—”
“No, you need to help me,” Maurice interrupts. “I’m running from the squirrels. I ate all the food in their garden, and you need to help me escape.”
A hundred footsteps echo through the trees from all the squirrels in the forest approaching them. Gina, Asher, and Colin run toward Alice and Maurice breathlessly from a different direction.
“You have to run, Maurice!” they say together. “We can’t stop the other squirrels—you need to stay safe!”
Maurice seizes Alice by one of her front legs and pulls her into the trees. The squirrels’ footsteps in the distance fade, and the cat and rabbit emerge into a dimly lit clearing.
In the middle of the clearing, there’s an old, abandoned house. Beneath it is a pile of dirt with a hole as an entrance—a burrow of some sort, maybe. Alice squints at it and tilts her head. She can smell it so clearly, and she thinks there’s someone inside, someone she needs to find—she imagines a mother cat inside with her children, but she doesn’t know her—
Bluebell leaps onto the burrow and opens a plastic bag full of berries. “I brought snacks!” she announces, and suddenly the three of them are inside her den, watching a movie and eating berries and popcorn together. Alice has never eaten popcorn before, but it tastes so good, and Bluebell keeps offering her more.
“Help!” someone in the movie screams. “Help, help me!”
“It’s just a movie. They’ll be okay,” Maurice tells Alice.
“Help me—help me!”
Alice tears her eyes open and sits up in alarm.
She’s awake now and laying on a tree branch over a lake. In the middle of the lake, there’s a cat—the same cat from before who chased away the geese. The cat is yelling for help and flailing in the water, their voice getting more distressed by the second.

	“Someone help me!”
Alice looks around desperately. Bluebell and Maurice are still sleeping beneath her, the geese are laughing from the other side of the lake, and someone needs to save the cat, but Alice hates water more than she’s ever hated anything.
What should she do? What should she do?
	
Quickly, what do you do`,

chapter7: {
text: `CHAPTER SEVEN – THE FOREST

	Alice knows that a medium level of stress is best when motivating someone to take action, but she is feeling a very high level of stress right now. Much more stressed than she’s ever been in her life, actually. But she needs to focus so she can figure out a plan.
“How can we stop a fire?” Bluebell asks desperately.
“Is there any water nearby?” Alice says.
Juniper shakes their head. “No, only in the lake, and we can’t bring it over here.”
“This is all my fault—I never should have—if I didn’t go in the forest―” Maurice stammers, his ears flat against his head as he looks wildly toward the fire.
Alice is working her brain as quickly as she can, and a crazy idea suddenly falls into place. She gasps. “There’s a fire hydrant by my house—some firefighters used it the other day and something came up so they left their hose there! We could bring the hose into the forest and use it to stop the fire!”

	“Does anyone else have any other ideas?” Bluebell asks. Everyone shakes their heads, so she says, “Okay, let’s go! Follow Alice!”
The four of them hightail their way to Alice’s house as the mice scatter into the forest to warn other animals. As the group passes deer, squirrels, and birds, they shout out warnings to them and call for help. By the time they leave the forest, their group has swelled to be three times its original size.
Together, they sprint out of the trees, and Alice leads them all to the fire hydrant she was talking about. There’s a hose coiled around it, left there for some unknown reason by the firefighters, and she rushes over and tries to lift part of it up.

	It’s so heavy that she drops it immediately.
“Okay, everyone,” she pants, “it looks like this will have to be a group effort. All of you pick up the hose! We’re bringing it into the forest to stop the fire!”
“Where do we go in the forest?” Juniper asks.
Alice peers toward the trees. She can’t tell where the fire is, exactly, but it’s big enough now that just about everywhere in the forest will be in danger. She hates to pick one place over another, but…someplace has to be saved. And she knows what she most wants to protect.
Which place do you save from the fire?`,

N_juniperHome: {
text: ` SAVE JUNIPER’S HOME

	“Juniper! Can you lead us to your burrow?” Alice shouts. She tries not to think of it as being selfish—she just wants to help Juniper save their burrow. But maybe it does have to do with it being her family, too.
Juniper nods.
“Okay,” Alice says. “Then…somehow, we need to open the fire hydrant to get the water to come out. I think there’s some kind of human tool they use to open the top, and it’s probably pretty difficult. Can anyone…?”
“We can,” volunteers one of the squirrels. “We know a place to get human tools. Give us five minutes and we’ll be right back.”
“I think it will take us more than that to get there,” Alice tells them. “But as soon as you see the hose stop moving, turn it on so we can use it, okay?”
“Got it!” the squirrel says.
Every animal but two squirrels hefts up the hose. Alice spots Maurice in line, but he’s staring at the fire with horror across his face, looking absolutely lost.
“Maurice,” she says as the animals begin to move. “None of this is your fault, okay? With psychology, I learned about these things. Having your emotions get like that—it isn’t because of you. It happens because of how you grew up and things that happened to you when you were younger. Nothing you do could have changed that.”
He nods blankly. The fire is reflected in his eyes.
“Maurice, do you hear me? This is not your fault. We’re going to fix the fire, and everything will be okay,” she says.
Then they march into the forest.

	Juniper directs everyone to their burrow, and they hurry through the trees, all breathing heavily and shaking by the time they get there. The fire hose is stretched between them like a massive snake that’s ready to strike—but in a good way, Alice hopes. This has to work. It has to.
The fire is massive in front of them, smoke billowing up in waves so strong Alice coughs even at her distance. Its heat swallows her up, and she feels like she could be melting.
Then the abandoned house comes into view through the haze. It’s so familiar, yet so strange—and it is the house from her dream, yet even more fallen-apart than before. But she can’t focus on that now. She needs to get to work.
“How are we going to aim the hose?” Bluebell calls.
Alice thinks about it for a moment, then shouts back over the roaring of the flames, “We’re going to need the tallest animals up front! That’s the deer!”
The deer helping them dart forward and lift the hose, aiming it upward toward the house and the trees. A flame alights on the roof of the house, and it races rapidly along the rest of the roof, but all they can do is wait.
“Is it going to work?” Juniper cries.
“The squirrels should have turned on the hose by now!” Bluebell says. “What are they waiting for?”
The hose writhes like a living snake as she speaks, and then a huge gush of water sprays out of its mouth. The deer hold it steady, and all the animals cheer. The flames on the roof of the house vanish under the water, just like that.

	Alice would smile at their success, but there’s still work to do. “Okay, everyone, great job!” she yells. “Now let’s get everything nearby!”
They walk the hose to the trees burning around the burrow, dousing every flame they can reach. The trees are blackened, some crumbling, and the ground is covered with ash…but this is something. They’re still saving part of the forest.
“There’s so much fire,” Maurice shouts. “Everywhere. It’s everywhere!”
Alice sees Bluebell try to comfort him, but she seems like she’s crying. In fact, so many of the animals are crying as they watch the forest burn.
Alice feels water on her own face. Oh, no, she’s crying too. But she can’t cry now—she has to focus! There’s still so much left to do!
Then she realizes that the water is on her head, not just her face. It’s on her ears, her back, her tail…it’s everywhere. There’s water everywhere!
The whole sky is covered in clouds as well as smoke, and now it’s raining, pouring so heavily that everything blurs around her. The fire hisses as the rain hits it, and soon everything is dark. There’s no glow left from the flames, only rain as far as Alice can see. The forest is safe. It’s really safe!
She hates water, but this time, Alice is overjoyed to be soaking wet.
All the animals cheer and hug each other. Maurice can’t seem to decide if he wants to smile or burst into tears, but Alice and Bluebell and Juniper hug him together, and then he collapses into sobs. They tell him together that everything will be okay, because it will be. It will all be okay.

const textBox = document.getElementById("text");
const image = document.getElementById("scene-image");
const audio = document.getElementById("scene-audio");
const choices = document.getElementById("choices");

function loadScene(id) {
  const scene = scenes[id];
  textBox.textContent = scene.text;
  image.src = scene.image;
  audio.pause();
  audio.src = scene.audio;
  audio.load();

  choices.innerHTML = "";
  scene.choices.forEach(c => {
    const btn = document.createElement("button");
    btn.textContent = c.label;
    btn.onclick = () => loadScene(c.next);
    choices.appendChild(btn);
  });
}

loadScene("title");
